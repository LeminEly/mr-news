name: mauritanie_news
description: Plateforme d'actualités mauritanienne — App mobile Flutter
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # BACKEND
  supabase_flutter: ^2.5.0

  # STATE MANAGEMENT
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # NAVIGATION
  go_router: ^13.2.0

  # WEBVIEW
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # UI UTILITIES
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^9.0.0 # ✅ Mis à jour (8.x incompatible avec Flutter récent)
  gap: ^3.0.1

  # LOCAL STORAGE
  shared_preferences: ^2.2.3

  # IMAGE HANDLING
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # UTILITIES
  uuid: ^4.4.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0 # ✅ Préfixe ^ ajouté
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.4.0
  envied: ^0.5.4+1
  pdf: ^3.12.0
  printing: ^5.14.3
  http: ^1.6.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
